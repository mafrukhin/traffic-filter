worker_processes auto;

events {
  worker_connections 10240;
}

http {

  lua_package_path "/etc/nginx/?.lua;;";

  server {

    listen 80;

    location / {
      access_by_lua_file /etc/nginx/filter.lua;
    }

    location /fp.html {
      root /etc/nginx/js;
    }

    # 🔥 WAJIB INI
    location /fp {
      proxy_pass http://botengine:8080;
    }

  }

}