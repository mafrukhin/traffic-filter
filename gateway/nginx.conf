worker_processes auto;

events {
  worker_connections 10240;
}

http {

  server {

    listen 80;
    server_name _;

    # route utama → Lua filter
    location / {
      access_by_lua_file /etc/nginx/filter.lua;
    }

    # serve fingerprint page
    location /fp.html {
      root /etc/nginx/js;
    }

    # forward ke Go botengine
    location /fp {
      proxy_pass http://botengine:8080;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

  }

}